background {
    path = ~/wallpapers/wallpaper_01.png
    blur_passes = 2
}

input-field {
    monitor = 
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.35
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(288c64ff)
    inner_color = rgba(aaaaaa88)
    font_color = rgba(ffffffff)
    halign = center
    valign = center
}

label {
    monitor = 
    text = cmd[update:1000] echo $(date '+%H:%M %d.%m.%Y')
    position = 0, 100
    font_size = 50
    halign = center
    valign = center
}

label {
    monitor = 
    text = $LAYOUT[EN,RU]
    position = 0, 50
    font_size = 14
    halign = center
    valign = center
}
